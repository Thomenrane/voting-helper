<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PROTOTYPE — test électoral (3 variantes, données fictives)</title>
</head>
<body>
<style>
  :root{
    --paper:#f7f8fa; --card:#ffffff; --ink:#20242e; --ink-2:#5a6172; --line:#dcdfe6;
    --accent:#5b50c7; --accent-soft:#eceafb; --prom:#5b50c7; --actes:#8a84b8;
    --pos:#3d7a54; --neg:#a04545; --warn-bg:#fdf3d7; --warn-ink:#7a5d13;
    --chip:#eef0f4; --focus:#5b50c7;
  }
  @media (prefers-color-scheme: dark){
    :root{ --paper:#191b22; --card:#22252f; --ink:#e8e9ee; --ink-2:#9aa0b0; --line:#3a3e4c;
      --accent:#8f86e8; --accent-soft:#2e2b4a; --prom:#8f86e8; --actes:#5f5a86;
      --pos:#6fbd8f; --neg:#d98080; --warn-bg:#3a3213; --warn-ink:#e3c96a; --chip:#2b2e3a; --focus:#8f86e8; }
  }
  :root[data-theme="dark"]{ --paper:#191b22; --card:#22252f; --ink:#e8e9ee; --ink-2:#9aa0b0; --line:#3a3e4c;
    --accent:#8f86e8; --accent-soft:#2e2b4a; --prom:#8f86e8; --actes:#5f5a86;
    --pos:#6fbd8f; --neg:#d98080; --warn-bg:#3a3213; --warn-ink:#e3c96a; --chip:#2b2e3a; --focus:#8f86e8; }
  :root[data-theme="light"]{ --paper:#f7f8fa; --card:#ffffff; --ink:#20242e; --ink-2:#5a6172; --line:#dcdfe6;
    --accent:#5b50c7; --accent-soft:#eceafb; --prom:#5b50c7; --actes:#8a84b8;
    --pos:#3d7a54; --neg:#a04545; --warn-bg:#fdf3d7; --warn-ink:#7a5d13; --chip:#eef0f4; --focus:#5b50c7; }

  body{ background:var(--paper); color:var(--ink);
    font:16px/1.55 ui-sans-serif, system-ui, "Segoe UI", Roboto, sans-serif; margin:0; }
  .mono{ font-family:ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-variant-numeric:tabular-nums; }
  .wrap{ max-width:880px; margin:0 auto; padding:16px 20px 120px; }
  .proto-banner{ background:var(--warn-bg); color:var(--warn-ink); font-size:13px; letter-spacing:.02em;
    padding:7px 20px; text-align:center; }
  .proto-banner strong{ text-transform:uppercase; letter-spacing:.08em; }
  header.site{ display:flex; align-items:baseline; gap:12px; padding:18px 0 6px; }
  header.site h1{ font-size:20px; margin:0; letter-spacing:-.01em; }
  header.site .lang{ margin-left:auto; font-size:13px; color:var(--ink-2); }
  .modebar{ display:flex; gap:8px; margin:10px 0 22px; }
  .modebar button{ font:inherit; font-size:14px; padding:6px 14px; border-radius:999px; border:1px solid var(--line);
    background:var(--card); color:var(--ink-2); cursor:pointer; }
  .modebar button[aria-pressed="true"]{ background:var(--accent); border-color:var(--accent); color:#fff; }
  .modebar button:focus-visible, .scale button:focus-visible, .pill button:focus-visible,
  .themetab:focus-visible, .cell:focus-visible, .rowhead:focus-visible, a:focus-visible,
  button:focus-visible{ outline:2px solid var(--focus); outline-offset:2px; }

  .card{ background:var(--card); border:1px solid var(--line); border-radius:10px; padding:20px; }
  .eyebrow{ font-size:12px; text-transform:uppercase; letter-spacing:.09em; color:var(--ink-2); margin:0 0 6px; }
  .qtext{ font-size:21px; line-height:1.4; margin:0 0 6px; text-wrap:balance; font-weight:600; }
  .qnote{ font-size:14px; color:var(--ink-2); margin:0 0 18px; }
  .qnote a{ color:var(--accent); }
  .scale{ display:flex; flex-wrap:wrap; gap:8px; }
  .scale button{ font:inherit; font-size:14px; padding:9px 13px; border-radius:8px; border:1px solid var(--line);
    background:var(--card); color:var(--ink); cursor:pointer; }
  .scale button[aria-pressed="true"]{ background:var(--accent); border-color:var(--accent); color:#fff; }
  .scale .skip{ color:var(--ink-2); border-style:dashed; }
  .navrow{ display:flex; align-items:center; gap:10px; margin-top:20px; }
  .navrow .spacer{ flex:1; }
  .btn{ font:inherit; font-size:14px; padding:8px 16px; border-radius:8px; border:1px solid var(--line);
    background:var(--card); color:var(--ink); cursor:pointer; }
  .btn.primary{ background:var(--accent); border-color:var(--accent); color:#fff; }
  .progress{ height:4px; background:var(--chip); border-radius:2px; margin:0 0 22px; }
  .progress i{ display:block; height:100%; background:var(--accent); border-radius:2px; }
  .metaline{ display:flex; justify-content:space-between; font-size:13px; color:var(--ink-2); margin-bottom:6px; }

  /* Résultats communs */
  .legend{ display:flex; gap:18px; font-size:13px; color:var(--ink-2); margin:10px 0 18px; flex-wrap:wrap;}
  .legend .sw{ display:inline-block; width:14px; height:10px; border-radius:2px; margin-right:6px; vertical-align:baseline;}
  .sw.prom{ background:var(--prom);} .sw.actes{ background:transparent; border:2px solid var(--actes); }
  .denom{ font-size:12px; color:var(--ink-2); }
  .gap-badge{ font-size:12px; padding:2px 8px; border-radius:999px; background:var(--chip); color:var(--ink-2); white-space:nowrap;}
  .gap-badge.big{ background:var(--warn-bg); color:var(--warn-ink); }
  .evi{ border-left:3px solid var(--line); padding:8px 12px; margin:8px 0; font-size:14px; }
  .evi .src{ font-size:12px; color:var(--ink-2); display:block; margin-top:4px;}
  .evi .vote-pour{ color:var(--pos); font-weight:600;} .evi .vote-contre{ color:var(--neg); font-weight:600;}
  .evi .vote-abst{ color:var(--ink-2); font-weight:600;}
  .contradiction{ display:inline-block; font-size:11px; text-transform:uppercase; letter-spacing:.06em;
    background:var(--warn-bg); color:var(--warn-ink); border-radius:4px; padding:2px 6px; margin-left:8px;}

  /* Variante A — classement à barres */
  .rankrow{ border-bottom:1px solid var(--line); padding:14px 4px; }
  .rankrow:last-child{ border-bottom:none; }
  .rowhead{ display:flex; align-items:center; gap:12px; width:100%; background:none; border:none; font:inherit;
    color:var(--ink); cursor:pointer; padding:0; text-align:left; }
  .rank-n{ width:22px; font-size:14px; color:var(--ink-2); }
  .pname{ font-weight:600; width:120px; }
  .bars{ flex:1; display:flex; flex-direction:column; gap:5px; min-width:140px;}
  .bar{ height:12px; border-radius:3px; position:relative; background:var(--chip); }
  .bar i{ position:absolute; inset:0 auto 0 0; border-radius:3px; }
  .bar.prom i{ background:var(--prom); }
  .bar.actes i{ background:transparent; border:2px solid var(--actes); box-sizing:border-box;}
  .scores{ width:110px; text-align:right; font-size:14px; }
  .scores .a{ color:var(--ink-2); font-size:13px;}
  .rowdetail{ margin:12px 0 4px 34px; display:none; }
  .rowdetail.open{ display:block; }
  .theme-block h4{ margin:14px 0 4px; font-size:14px; }

  /* Variante B — formulaire dense + slope */
  .densegroup{ margin-bottom:26px; }
  .densegroup h3{ font-size:15px; text-transform:uppercase; letter-spacing:.07em; margin:0 0 10px; color:var(--ink-2);}
  .denserow{ display:flex; align-items:center; gap:14px; padding:10px 12px; border:1px solid var(--line);
    border-radius:8px; margin-bottom:8px; background:var(--card); flex-wrap:wrap;}
  .denserow p{ margin:0; flex:1; font-size:15px; min-width:220px;}
  .pill{ display:flex; gap:4px; }
  .pill button{ width:34px; height:30px; border:1px solid var(--line); background:var(--card); color:var(--ink-2);
    font:inherit; font-size:12px; cursor:pointer; }
  .pill button:first-child{ border-radius:6px 0 0 6px;} .pill button:last-child{ border-radius:0 6px 6px 0;}
  .pill button[aria-pressed="true"]{ background:var(--accent); border-color:var(--accent); color:#fff;}
  .slopewrap{ display:flex; gap:0; align-items:stretch; }
  .slopecol{ flex:1; display:flex; flex-direction:column; gap:10px;}
  .slopecol h3{ font-size:13px; text-transform:uppercase; letter-spacing:.07em; color:var(--ink-2); margin:0 0 4px;}
  .slopecard{ border:1px solid var(--line); border-radius:8px; padding:8px 12px; font-size:14px;
    display:flex; justify-content:space-between; gap:8px; background:var(--card);}
  .slopecard b{ font-weight:600; }
  svg.slope{ width:90px; flex:none; }
  svg.slope line{ stroke:var(--actes); stroke-width:1.5; opacity:.8;}
  svg.slope line.big{ stroke:var(--neg); stroke-width:2.5; opacity:1;}

  /* Variante C — thèmes + heatmap */
  .themetabs{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
  .themetab{ font:inherit; font-size:13px; padding:6px 12px; border-radius:999px; border:1px solid var(--line);
    background:var(--card); color:var(--ink-2); cursor:pointer;}
  .themetab[aria-pressed="true"]{ background:var(--ink); color:var(--paper); border-color:var(--ink);}
  .themetab .done{ color:var(--pos); }
  .heatwrap{ overflow-x:auto; }
  table.heat{ border-collapse:collapse; width:100%; min-width:560px; font-size:14px;}
  table.heat th{ font-size:12px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-2);
    font-weight:600; padding:8px; text-align:left;}
  table.heat td{ padding:4px; }
  .cell{ display:block; width:100%; border:none; font:inherit; border-radius:6px; padding:10px 6px; cursor:pointer;
    text-align:center; color:var(--ink); background:var(--chip); }
  .cell small{ display:block; font-size:11px; color:inherit; opacity:.75;}
  .drawer{ position:fixed; inset:auto 0 0 0; max-height:60vh; overflow-y:auto; background:var(--card);
    border-top:2px solid var(--accent); padding:20px; display:none; z-index:40;
    box-shadow:0 -8px 30px rgba(0,0,0,.18);}
  .drawer.open{ display:block; }
  .drawer .close{ float:right; }
  .drawer .inner{ max-width:880px; margin:0 auto; }

  /* Switcher prototype */
  .switcher{ position:fixed; bottom:16px; left:50%; transform:translateX(-50%); z-index:60;
    display:flex; align-items:center; gap:12px; background:var(--ink); color:var(--paper);
    border-radius:999px; padding:8px 14px; box-shadow:0 4px 18px rgba(0,0,0,.35); font-size:13px;}
  .switcher button{ background:none; border:none; color:inherit; font-size:16px; cursor:pointer; padding:2px 6px;}
  .switcher .vlabel{ min-width:250px; text-align:center; letter-spacing:.02em;}

  @media (prefers-reduced-motion: no-preference){
    .rowdetail.open, .drawer.open{ animation:fade .18s ease-out; }
    @keyframes fade{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;} }
  }
  @media (max-width:640px){
    .pname{ width:90px; } .scores{ width:auto; } .qtext{ font-size:18px; }
    .switcher .vlabel{ min-width:150px; }
  }
</style>

<div class="proto-banner"><strong>Prototype jetable</strong> — toutes les positions, citations et scores sont <strong>fictifs</strong>. Démo FR uniquement (le produit est FR/NL). Ticket <a href="https://github.com/Thomenrane/voting-helper/issues/11" style="color:inherit">#11</a>.</div>

<div class="wrap">
  <header class="site">
    <h1>voting-helper <span style="font-weight:400;color:var(--ink-2)">· test électoral fédéral</span></h1>
    <span class="lang mono">FR · NL</span>
  </header>
  <div class="modebar" role="tablist" aria-label="Mode">
    <button id="mode-test" aria-pressed="true">Le test</button>
    <button id="mode-res" aria-pressed="false">Résultats (démo)</button>
  </div>
  <main id="app" aria-live="polite"></main>
</div>

<div class="drawer" id="drawer" role="dialog" aria-label="Preuves">
  <div class="inner">
    <button class="btn close" id="drawer-close">Fermer</button>
    <div id="drawer-body"></div>
  </div>
</div>

<div class="switcher" id="switcher">
  <button id="sw-prev" aria-label="Variante précédente">◀</button>
  <span class="vlabel mono" id="sw-label"></span>
  <button id="sw-next" aria-label="Variante suivante">▶</button>
</div>

<script>
/* Trois variantes du parcours test + résultats, commutables via ?variant= (A|B|C) et flèches ← →. */
const VARIANTS = { A:"Focus — une question à la fois", B:"Duel — promesses vs actes", C:"Explorateur — par thème" };

/* ---------- Données fictives ---------- */
const THEMES = ["Énergie & climat","Fiscalité","Pensions & sécu","Migration & asile"];
const QUESTIONS = [
  {t:0, q:"Prolonger l'exploitation de réacteurs nucléaires au-delà de 2035.",
   note:"Mesure concrète type : prolongation de Doel 4 et Tihange 3."},
  {t:0, q:"Interdire la vente de voitures thermiques neuves avant l'échéance européenne.",
   note:"Mesure concrète type : avancer l'interdiction à 2030."},
  {t:1, q:"Réduire la TVA sur les produits alimentaires de base.",
   note:"Mesure concrète type : TVA à 0 % sur un panier défini."},
  {t:1, q:"Instaurer un impôt sur les plus grands patrimoines.",
   note:"Mesure concrète type : taxe sur les patrimoines > 1 M€."},
  {t:2, q:"Porter la pension minimum au-dessus du seuil de pauvreté.",
   note:"Mesure concrète type : pension minimum à 1 700 € nets."},
  {t:2, q:"Comptabiliser davantage les métiers pénibles dans l'âge de la pension.",
   note:"Mesure concrète type : liste des métiers pénibles avec départ anticipé."},
  {t:3, q:"Élargir les voies de migration légale de travail pour les métiers en pénurie.",
   note:"Mesure concrète type : permis combiné accéléré pour les fonctions critiques."},
  {t:3, q:"Conditionner davantage l'accès aux aides sociales à la durée de séjour.",
   note:"Mesure concrète type : allongement du délai d'accès à certaines allocations."},
];
const SCALE = [ ["++","Tout à fait d'accord",2],["+","Plutôt d'accord",1],["0","Neutre",0],
  ["–","Plutôt contre",-1],["––","Tout à fait contre",-2] ];

/* Scores fictifs : [promesses, actes, dénominateur actes] + par thème [prom, actes|null] */
const PARTIS = [
  {n:"Parti A", prom:78, act:64, dn:6, th:[[85,70],[80,55],[75,68],[72,null]]},
  {n:"Parti B", prom:71, act:69, dn:7, th:[[60,62],[78,74],[70,66],[76,72]]},
  {n:"Parti C", prom:64, act:41, dn:5, th:[[70,35],[66,40],[58,48],[62,null]]},
  {n:"Parti D", prom:55, act:57, dn:6, th:[[50,54],[52,58],[61,60],[57,55]]},
  {n:"Parti E", prom:43, act:38, dn:4, th:[[40,32],[45,null],[48,44],[39,38]]},
  {n:"Parti F", prom:31, act:36, dn:5, th:[[28,34],[30,38],[35,36],[31,null]]},
];
const EVIDENCE = [
  {kind:"prog", text:"« Extrait fictif du programme illustrant la position du parti sur cette mesure. »",
   src:"Programme fédéral 2024 (fictif), p. 42 — snapshot du 01/03/2026"},
  {kind:"vote", text:"Vote lié (fictif) : proposition de loi sur la mesure — séance plénière n° 123.",
   vote:"contre", src:"CRIV 56 (fictif) · justification de la liaison en une phrase", contra:true},
  {kind:"vote", text:"Vote lié (fictif) : amendement portant directement sur la mesure.",
   vote:"pour", src:"CRIV 56 (fictif) · vote final en plénière"},
];

/* ---------- État ---------- */
const answers = {};           // idx question -> valeur (-2..2) ou "skip"
let mode = "test";            // test | res
let variant = "A";
let curQ = 0;                 // variante A
let curTheme = 0;             // variante C
let openRow = -1;             // variante A résultats

/* ---------- Utilitaires ---------- */
const $ = s => document.querySelector(s);
const app = $("#app");
const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;");
function evidenceHtml(){
  return EVIDENCE.map(e=>{
    const v = e.vote ? ` — a voté <span class="vote-${e.vote==='pour'?'pour':e.vote==='contre'?'contre':'abst'}">${e.vote}</span>` : "";
    const c = e.contra ? `<span class="contradiction">promesse vs vote</span>` : "";
    return `<div class="evi">${esc(e.text)}${v}${c}<span class="src">${esc(e.src)}</span></div>`;
  }).join("");
}
function answeredCount(){ return Object.keys(answers).length; }

/* ---------- Variante A : wizard ---------- */
function renderA(){
  if(mode==="res") return renderResultsA();
  const q = QUESTIONS[curQ];
  app.innerHTML = `
    <div class="metaline"><span>Question ${curQ+1} / ${QUESTIONS.length}</span><span>${THEMES[q.t]}</span></div>
    <div class="progress" aria-hidden="true"><i style="width:${(curQ)/QUESTIONS.length*100}%"></i></div>
    <div class="card">
      <p class="eyebrow">${THEMES[q.t]}</p>
      <p class="qtext">${esc(q.q)}</p>
      <p class="qnote">${esc(q.note)} · <a href="#" onclick="return false">pourquoi cette question ?</a></p>
      <div class="scale" role="group" aria-label="Votre position">
        ${SCALE.map(([s,l,v])=>`<button data-v="${v}" aria-pressed="${answers[curQ]===v}"><span class="mono">${s}</span>&nbsp; ${l}</button>`).join("")}
        <button class="skip" data-v="skip" aria-pressed="${answers[curQ]==='skip'}">Sans opinion</button>
      </div>
      <div class="navrow">
        <button class="btn" id="a-prev" ${curQ===0?"disabled":""}>← Précédente</button>
        <span class="spacer"></span>
        <button class="btn" id="a-next">${curQ===QUESTIONS.length-1?"Terminer":"Suivante →"}</button>
      </div>
    </div>`;
  app.querySelectorAll(".scale button").forEach(b=>b.onclick=()=>{
    const v=b.dataset.v; answers[curQ]= v==="skip"?"skip":Number(v);
    if(curQ<QUESTIONS.length-1){curQ++; renderA();} else { mode="res"; syncMode(); render(); }
  });
  $("#a-prev") && ($("#a-prev").onclick=()=>{curQ=Math.max(0,curQ-1);renderA();});
  $("#a-next").onclick=()=>{ if(curQ<QUESTIONS.length-1){curQ++;renderA();} else {mode="res";syncMode();render();} };
}
function renderResultsA(){
  app.innerHTML = `
    <h2 style="margin:0 0 2px">Votre alignement <span class="denom">(démo — ${answeredCount()||"aucune"} réponse(s))</span></h2>
    <div class="legend">
      <span><i class="sw prom"></i>Promesses — programme 2024</span>
      <span><i class="sw actes"></i>Actes — votes à la Chambre</span>
      <span class="denom">Cliquez un parti pour auditer les preuves.</span>
    </div>
    ${PARTIS.map((p,i)=>`
      <div class="rankrow">
        <button class="rowhead" data-i="${i}" aria-expanded="${openRow===i}">
          <span class="rank-n mono">${i+1}</span>
          <span class="pname">${p.n}</span>
          <span class="bars">
            <span class="bar prom" title="Promesses ${p.prom}%"><i style="width:${p.prom}%"></i></span>
            <span class="bar actes" title="Actes ${p.act}%"><i style="width:${p.act}%"></i></span>
          </span>
          <span class="scores mono">${p.prom}%<br><span class="a">${p.act}% actes</span></span>
          <span class="gap-badge ${Math.abs(p.prom-p.act)>=15?"big":""}">écart ${p.prom-p.act>0?"−":"+"}${Math.abs(p.prom-p.act)}</span>
        </button>
        <div class="rowdetail ${openRow===i?"open":""}">
          <p class="denom">Score actes basé sur ${p.dn}/${QUESTIONS.length} énoncés (votes liés existants).</p>
          ${THEMES.map((t,ti)=>`
            <div class="theme-block">
              <h4>${t} — <span class="mono">${p.th[ti][0]}%</span> promesses · <span class="mono">${p.th[ti][1]===null?"n.d.":p.th[ti][1]+"%"}</span> actes</h4>
              ${ti===0 ? evidenceHtml() : `<p class="denom">Énoncés et preuves (démo repliée).</p>`}
            </div>`).join("")}
        </div>
      </div>`).join("")}`;
  app.querySelectorAll(".rowhead").forEach(b=>b.onclick=()=>{
    openRow = openRow===Number(b.dataset.i) ? -1 : Number(b.dataset.i); renderResultsA();
  });
}

/* ---------- Variante B : formulaire dense + slope chart ---------- */
function renderB(){
  if(mode==="res") return renderResultsB();
  app.innerHTML = `
    <p class="denom" style="margin-top:0">Répondez en faisant défiler — ${answeredCount()}/${QUESTIONS.length} répondues.
    Échelle : <span class="mono">++ / + / 0 / – / –– / s.o.</span></p>
    ${THEMES.map((t,ti)=>`
      <div class="densegroup">
        <h3>${t}</h3>
        ${QUESTIONS.map((q,qi)=>q.t!==ti?"":`
          <div class="denserow">
            <p title="${esc(q.note)}">${esc(q.q)}</p>
            <span class="pill" role="group" aria-label="Position">
              ${SCALE.map(([s,l,v])=>`<button data-q="${qi}" data-v="${v}" title="${l}" aria-pressed="${answers[qi]===v}">${s}</button>`).join("")}
              <button data-q="${qi}" data-v="skip" title="Sans opinion" aria-pressed="${answers[qi]==='skip'}">s.o.</button>
            </span>
          </div>`).join("")}
      </div>`).join("")}
    <button class="btn primary" id="b-done">Voir mes résultats</button>`;
  app.querySelectorAll(".pill button").forEach(b=>b.onclick=()=>{
    const v=b.dataset.v; answers[b.dataset.q]= v==="skip"?"skip":Number(v); renderB();
  });
  $("#b-done").onclick=()=>{mode="res";syncMode();render();};
}
function renderResultsB(){
  const byProm=[...PARTIS].sort((a,b)=>b.prom-a.prom);
  const byAct=[...PARTIS].sort((a,b)=>b.act-a.act);
  const H = PARTIS.length*46;
  const lines = PARTIS.map(p=>{
    const y1=byProm.indexOf(p)*46+23, y2=byAct.indexOf(p)*46+23;
    return `<line x1="0" y1="${y1}" x2="90" y2="${y2}" class="${Math.abs(p.prom-p.act)>=15?"big":""}"><title>${p.n}</title></line>`;
  }).join("");
  app.innerHTML = `
    <h2 style="margin:0 0 2px">Promesses <span style="color:var(--ink-2)">vs</span> actes</h2>
    <p class="denom">Deux classements séparés — les lignes rouges signalent un écart ≥ 15 points. Données fictives.</p>
    <div class="slopewrap">
      <div class="slopecol"><h3>Ce qu'ils promettent</h3>
        ${byProm.map(p=>`<div class="slopecard"><b>${p.n}</b><span class="mono">${p.prom}%</span></div>`).join("")}</div>
      <svg class="slope" viewBox="0 0 90 ${H}" aria-hidden="true" style="height:${H}px">${lines}</svg>
      <div class="slopecol"><h3>Ce qu'ils ont voté</h3>
        ${byAct.map(p=>`<div class="slopecard"><b>${p.n}</b><span class="mono">${p.act}%</span> <span class="denom">${p.dn}/${QUESTIONS.length} én.</span></div>`).join("")}</div>
    </div>
    <div class="card" style="margin-top:22px">
      <p class="eyebrow">Zoom écart le plus marquant (démo)</p>
      <p style="margin:0 0 8px"><b>Parti C</b> : 64 % d'alignement sur les promesses, 41 % sur les actes.</p>
      ${evidenceHtml()}
    </div>`;
}

/* ---------- Variante C : par thème + heatmap ---------- */
function renderC(){
  if(mode==="res") return renderResultsC();
  const qs = QUESTIONS.map((q,i)=>({...q,i})).filter(q=>q.t===curTheme);
  const doneTheme = t => QUESTIONS.every((q,i)=>q.t!==t || answers[i]!==undefined);
  app.innerHTML = `
    <div class="themetabs" role="tablist" aria-label="Thèmes">
      ${THEMES.map((t,i)=>`<button class="themetab" data-t="${i}" aria-pressed="${i===curTheme}">${t} ${doneTheme(i)?'<span class="done">✓</span>':""}</button>`).join("")}
    </div>
    ${qs.map(q=>`
      <div class="card" style="margin-bottom:14px">
        <p class="qtext" style="font-size:17px">${esc(q.q)}</p>
        <p class="qnote">${esc(q.note)}</p>
        <div class="scale">
          ${SCALE.map(([s,l,v])=>`<button data-q="${q.i}" data-v="${v}" aria-pressed="${answers[q.i]===v}"><span class="mono">${s}</span>&nbsp;${l}</button>`).join("")}
          <button class="skip" data-q="${q.i}" data-v="skip" aria-pressed="${answers[q.i]==='skip'}">Sans opinion</button>
        </div>
      </div>`).join("")}
    <div class="navrow">
      <span class="denom">${answeredCount()}/${QUESTIONS.length} répondues au total</span>
      <span class="spacer"></span>
      ${curTheme<THEMES.length-1
        ? `<button class="btn primary" id="c-next">Thème suivant →</button>`
        : `<button class="btn primary" id="c-done">Voir mes résultats</button>`}
    </div>`;
  app.querySelectorAll(".themetab").forEach(b=>b.onclick=()=>{curTheme=Number(b.dataset.t);renderC();});
  app.querySelectorAll(".scale button").forEach(b=>b.onclick=()=>{
    const v=b.dataset.v; answers[b.dataset.q]= v==="skip"?"skip":Number(v); renderC();
  });
  $("#c-next") && ($("#c-next").onclick=()=>{curTheme++;renderC();});
  $("#c-done") && ($("#c-done").onclick=()=>{mode="res";syncMode();render();});
}
function heatColor(v){
  if(v===null) return "var(--chip)";
  const light = document.documentElement.dataset.theme!=="dark" && !matchMedia("(prefers-color-scheme: dark)").matches
    || document.documentElement.dataset.theme==="light";
  const a = .15+.7*(v/100);
  return `color-mix(in srgb, var(--accent) ${Math.round(a*100)}%, var(--card))`;
}
function renderResultsC(){
  app.innerHTML = `
    <h2 style="margin:0 0 2px">Carte de vos alignements</h2>
    <p class="denom">Chaque cellule : promesses / actes. Cliquez pour auditer les preuves. Données fictives.</p>
    <div class="heatwrap"><table class="heat">
      <thead><tr><th>Parti</th>${THEMES.map(t=>`<th>${t}</th>`).join("")}<th>Global</th></tr></thead>
      <tbody>
      ${PARTIS.map((p,pi)=>`<tr>
        <th scope="row">${p.n}</th>
        ${p.th.map((s,ti)=>`<td><button class="cell" data-p="${pi}" data-t="${ti}"
            style="background:${heatColor(s[0])}">
            <span class="mono">${s[0]}%</span><small class="mono">${s[1]===null?"actes n.d.":s[1]+"% actes"}</small></button></td>`).join("")}
        <td><button class="cell" data-p="${pi}" data-t="-1" style="background:${heatColor(p.prom)}">
          <span class="mono"><b>${p.prom}%</b></span><small class="mono">${p.act}% actes</small></button></td>
      </tr>`).join("")}
      </tbody></table></div>`;
  app.querySelectorAll(".cell").forEach(b=>b.onclick=()=>{
    const p=PARTIS[Number(b.dataset.p)], ti=Number(b.dataset.t);
    $("#drawer-body").innerHTML = `
      <p class="eyebrow">${p.n} — ${ti<0?"global":THEMES[ti]}</p>
      <p class="denom">Score actes basé sur ${p.dn}/${QUESTIONS.length} énoncés à votes liés.</p>
      ${evidenceHtml()}`;
    $("#drawer").classList.add("open");
  });
}

/* ---------- Orchestration ---------- */
function render(){ ({A:renderA,B:renderB,C:renderC})[variant](); }
function syncMode(){
  $("#mode-test").setAttribute("aria-pressed", mode==="test");
  $("#mode-res").setAttribute("aria-pressed", mode==="res");
}
$("#mode-test").onclick=()=>{mode="test";syncMode();render();};
$("#mode-res").onclick=()=>{mode="res";syncMode();render();};
$("#drawer-close").onclick=()=>$("#drawer").classList.remove("open");

function setVariant(v, push=true){
  variant=v; openRow=-1; $("#drawer").classList.remove("open");
  $("#sw-label").textContent = `${v} — ${VARIANTS[v]}`;
  if(push){ const u=new URL(location); u.searchParams.set("variant",v); history.replaceState(null,"",u); }
  render();
}
const keys=Object.keys(VARIANTS);
$("#sw-prev").onclick=()=>setVariant(keys[(keys.indexOf(variant)+keys.length-1)%keys.length]);
$("#sw-next").onclick=()=>setVariant(keys[(keys.indexOf(variant)+1)%keys.length]);
document.addEventListener("keydown",e=>{
  if(["INPUT","TEXTAREA"].includes(document.activeElement.tagName)||document.activeElement.isContentEditable) return;
  if(e.key==="ArrowLeft") $("#sw-prev").click();
  if(e.key==="ArrowRight") $("#sw-next").click();
});
const initV = new URL(location).searchParams.get("variant");
setVariant(keys.includes(initV)?initV:"A", false);
</script>
